name: Bug Report
description: Report something that is not working correctly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem.
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Add screenshots or logs if available.

  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 122, Firefox 124

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 14, Windows 11, Linux